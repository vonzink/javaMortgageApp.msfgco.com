server:
  port: 8084

spring:
  application:
    name: msfg-mortgage
  datasource:
    url: jdbc:mysql://localhost:3309/msfg_mortgage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: msfg_user
    password: msfg_password
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:change-me-to-a-secure-random-string-at-least-64-chars-long-for-production}
  expiration-ms: 86400000
  refresh-expiration-ms: 604800000

file:
  upload-dir: ${UPLOAD_DIR:uploads}

app:
  encryption-key: ${ENCRYPTION_KEY:change-this-to-secure-key-for-production}

logging:
  level:
    com.msfg.mortgage: DEBUG
    org.springframework.security: INFO
